<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */

.topbar{

  width:100%;

  height:75px;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #179647
  );

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 20px;

  color:white;

  position:sticky;

  top:0;

  z-index:999;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.15);
}

/* BACK BUTTON */

.back-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:
  clamp(
    28px,
    4vw,
    42px
  );

  font-weight:900;

  color:white;

  cursor:pointer;

  transition:0.2s;

  line-height:1;

  padding:
  clamp(2px,1vw,6px)
  clamp(6px,1vw,12px);
}
  
.back-btn:hover{

  transform:scale(1.05);

  background:
  rgba(255,255,255,0.22);
}

/* TITLE */

.title{

  font-size:20px;

  font-weight:bold;
}

/* PLUS BUTTON */

.plus-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:
  clamp(
    34px,
    5vw,
    52px
  );

  font-weight:200;

  color:white;

  cursor:pointer;

  transition:0.25s;

  position:relative;

  padding:
  clamp(2px,1vw,6px);

  line-height:1;
}


/* CONTENT */

.content{

  padding:20px;
}

/* CARD */

.data-card{

  background:white;

  border-radius:22px;

  padding:18px;

  margin-bottom:14px;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.08);
}

.data-card h3{

  color:#0a6b2d;

  margin-bottom:8px;
}

.data-card p{

  color:#666;

  font-size:14px;
}

/* MOBILE */

@media(max-width:600px){

  .topbar{

    height:65px;

    padding:0 14px;
  }

  .title{

    font-size:17px;
  }
}

/* OVERLAY */

.popup-overlay{

  position:fixed;

  inset:0;

  background:
  rgba(0,0,0,0.45);

  backdrop-filter:blur(4px);

  display:none;

  align-items:center;

  justify-content:center;

  padding:20px;

  z-index:5000;
}

/* FORM */

.popup-form{

  width:100%;

  max-width:520px;

  max-height:90vh;

  overflow-y:auto;

  background:white;

  border-radius:30px;

  padding:24px;

  box-shadow:
  0 20px 50px rgba(0,0,0,0.25);

  animation:popupShow 0.25s ease;
}

/* ANIMATION */

@keyframes popupShow{

  from{

    opacity:0;

    transform:
    translateY(20px)
    scale(0.96);
  }

  to{

    opacity:1;

    transform:
    translateY(0)
    scale(1);
  }

}

/* HEADER */

.popup-header{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-bottom:24px;
}

.popup-header h2{

  color:#0a6b2d;

  font-size:
  clamp(20px,2vw,28px);
}

.popup-header span{

  font-size:28px;

  cursor:pointer;

  color:#555;
}

/* FORM GROUP */

.form-group{

  display:flex;

  flex-direction:column;

  margin-bottom:18px;
}

.form-group label{

  font-size:14px;

  font-weight:600;

  color:#333;

  margin-bottom:8px;
}

/* INPUT */

.form-group input,
.form-group select{

  width:100%;

  border:none;

  outline:none;

  background:#f3f3f3;

  border-radius:16px;

  padding:14px 16px;

  font-size:14px;

  transition:0.2s;
}

.form-group input:focus,
.form-group select:focus{

  background:#ebebeb;

  box-shadow:
  0 0 0 2px rgba(10,107,45,0.15);
}

/* BUTTON */

.save-btn{

  width:100%;

  border:none;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #16a34a
  );

  color:white;

  padding:16px;

  border-radius:18px;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  margin-top:10px;

  transition:0.25s;
}

.save-btn:hover{

  transform:translateY(-2px);

  opacity:0.95;
}

/* MOBILE */

@media(max-width:600px){

  .popup-form{

    border-radius:24px;

    padding:18px;
  }

  .form-group input,
  .form-group select{

    padding:13px;
  }

}

/* TABLE WRAPPER */

.table-wrapper{

  width:100%;

  background:white;

  border-radius:24px;

  box-shadow:
  0 5px 20px rgba(0,0,0,0.08);

  overflow:hidden;
}

/* TABLE */

table{

  width:100%;

  border-collapse:collapse;

  table-layout:fixed;
}
/* HEAD */

thead{

  background:
  rgba(22,163,74,0.12);
}

th{

  padding:18px;

  text-align:left;

  color:#0a6b2d;

  font-size:14px;

  font-weight:700;

  white-space:nowrap;
}

/* BODY */

td{

  padding:16px 18px;

  font-size:14px;

  color:#333;

  border-top:
  1px solid #f1f1f1;

  white-space:nowrap;
}

/* ROW */

tbody tr{

  transition:0.2s;
}

tbody tr:hover{

  background:#fafafa;
}

/* MOBILE */

@media(max-width:600px){

  th,
  td{

    padding:14px;

    font-size:13px;
  }

}

  /* ACTION */

.action-box{

  position:relative;
}

/* TITIK 3 */

.action-btn{

  border:none;

  background:none;

  font-size:22px;

  cursor:pointer;

  color:#666;
}

/* MENU */

.action-menu{

  position:absolute;

  right:0;

  top:30px;

  background:white;

  border-radius:14px;

  overflow:hidden;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.12);

  display:none;

  min-width:120px;

  z-index:100;
}

.action-menu div{

  padding:12px;

  cursor:pointer;

  font-size:14px;

  transition:0.2s;
}

.action-menu div:hover{

  background:#f3f3f3;
}

  /* AKSI CELL */

.aksi-cell{

  width:1%;

  white-space:nowrap;

  text-align:right;

  padding-right:10px;
}

/* ACTION BOX */

.action-box{

  display:flex;

  justify-content:flex-end;

  position:relative;
}

/* TITIK 3 */

.action-btn{

  border:none;

  background:none;

  font-size:22px;

  cursor:pointer;

  color:#666;

  padding:0;
}

  /* SORT */

.sort-box{

  display:flex;

  gap:10px;

  margin-bottom:14px;
}

.sort-box button{

  border:none;

  background:
  rgba(22,163,74,0.12);

  color:#0a6b2d;

  padding:10px 16px;

  border-radius:14px;

  cursor:pointer;

  font-weight:600;

  transition:0.2s;
}

.sort-box button:hover{

  background:
  rgba(22,163,74,0.2);
}

/* SORT HEADER */

.sort-header{

  display:flex;

  align-items:center;

  gap:8px;
}

/* BOX */

.sort-dropdown-box{

  position:relative;
}

/* ICON */

.sort-icon{

  cursor:pointer;

  font-size:15px;

  color:#0a6b2d;

  user-select:none;

  transition:0.2s;
}

.sort-icon:hover{

  opacity:0.7;
}

/* MENU */

.sort-menu{

  position:absolute;

  top:24px;

  left:0;

  background:white;

  border-radius:14px;

  overflow:hidden;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.12);

  display:none;

  min-width:90px;

  z-index:999;
}

/* ITEM */

.sort-menu div{

  padding:10px 14px;

  font-size:13px;

  color:#333;

  cursor:pointer;

  transition:0.2s;
}

.sort-menu div:hover{

  background:#f3f3f3;
}

  /* =========================
   MOBILE RESPONSIVE
========================= */

@media(max-width:768px){

  /* CONTENT */

  .content{

    padding:10px;
  }

  /* TABLE WRAPPER */

  .table-wrapper{

    border-radius:18px;
  }

  /* TABLE */

  table{

    width:100%;

    table-layout:fixed;
  }

  /* HEAD */

  th{

    font-size:8px;

    padding:10px 4px;

    white-space:nowrap;
  }

  /* BODY */

  td{

    font-size:8px;

    padding:10px 4px;

    white-space:nowrap;

    overflow:hidden;

    text-overflow:ellipsis;
  }

  /* SORT */

  .sort-header{

    gap:2px;
  }

  .sort-icon{

    font-size:9px;
  }

  /* TITIK 3 */

  .action-btn{

    font-size:14px;
  }

  /* TOPBAR */

  .topbar{

    height:58px;

    padding:0 10px;
  }

  .title{

    font-size:16px;
  }

  .back-btn{

    font-size:26px;
  }

  .plus-btn{

    font-size:38px;
  }

}

  @media(max-width:768px){

  /* CONTENT */

  .content{

    padding:10px;
  }

  /* TABLE */

  th{

    font-size:10px;

    padding:12px 6px;
  }

  td{

  font-size:9px;

  padding:12px 6px;

  white-space:nowrap;
}

  /* HEADER */

  .sort-header{

    gap:3px;
  }

  /* SORT ICON */

  .sort-icon{

    font-size:11px;
  }

  /* ACTION */

  .action-btn{

    font-size:16px;
  }

  /* TABLE CARD */

  .table-wrapper{

    border-radius:20px;
  }

}
  
</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar">

  <!-- BACK -->

<div class="back-btn"
     onclick="history.back()">

  ❮

</div>

  <!-- TITLE -->

  <div class="title">
    Database
  </div>

  <!-- PLUS -->

 <div class="plus-btn"
     onclick="openPopup()">

  +

</div>
</div>
  

<!-- CONTENT -->
<div class="content">

  <div class="table-wrapper">

  <table>

    <!-- HEAD -->

    <thead>

      <tr>

  <th>

  <div class="sort-header">

    Jenis Transaksi

    <div class="sort-dropdown-box">

      <!-- ICON -->

      <span class="sort-icon"
            onclick="toggleSortMenu()">

        ⇅

      </span>

      <!-- MENU -->

      <div class="sort-menu"
           id="sortMenu">

        <div onclick="sortAZ()">
          A-Z
        </div>

        <div onclick="sortZA()">
          Z-A
        </div>

      </div>

    </div>

  </div>

</th>

  <th>Range Nominal</th>

  <th>Biaya Admin</th>

  <th>Admin Bank</th>

  <th>Kategori</th>

  <th>Efek</th>

</tr>
      
    </thead>

    <!-- BODY -->

    <tbody id="tableBody">

    </tbody>

  </table>

</div>
</div>

<!-- POPUP FORM -->

<div class="popup-overlay"
     id="popupOverlay">

  <div class="popup-form">

    <!-- HEADER -->

    <div class="popup-header">

      <h2>Tambah Data</h2>

      <span onclick="closePopup()">
        ✕
      </span>

    </div>

    <!-- FORM -->

<div class="form-group">

  <label>Jenis Transaksi</label>

  <input type="text"
         id="jenisTransaksi"
         placeholder="Contoh: Transfer BCA">

</div>

<div class="form-group">

  <label>Range Nominal</label>

  <input type="text"
         id="rangeNominal"
         placeholder="Contoh: 10.000 - 100.000">

</div>

<div class="form-group">

  <label>Biaya Admin</label>

  <input type="number"
         id="biayaAdmin"
         placeholder="Masukkan nominal">

</div>

<div class="form-group">

  <label>Admin Bank</label>

  <input type="number"
         id="adminBank"
         placeholder="Masukkan nominal">

</div>

<div class="form-group">

  <label>Kategori</label>

  <select id="kategori"
        onchange="syncKategori()">

  <option>Saldo In</option>

  <option>Saldo Out</option>

  <option>None</option>

</select>

</div>

<div class="form-group">

  <label>Efek Kategori</label>

  <select id="efekKategori">

  <option>Cash In</option>

  <option>Cash Out</option>

  <option>None</option>

</select>

</div>
    
    <!-- BUTTON -->

   <button class="save-btn"
        onclick="simpanData()">

  Simpan Data

</button>

</div>

<script>

  /* OPEN */

function openPopup(){

  document.getElementById("popupOverlay")
  .style.display = "flex";
}

/* CLOSE */

function closePopup(){

  document.getElementById("popupOverlay")
  .style.display = "none";
}

/* CLOSE KLIK LUAR */

window.addEventListener("click", function(e){

  const popup =
  document.getElementById("popupOverlay");

  if(e.target === popup){

    popup.style.display = "none";
  }

});

 /* LOAD DATA */

let dataTransaksi =
JSON.parse(localStorage.getItem("dataTransaksi"))
|| [];

let editIndex = null;

/* RENDER TABLE */

function renderTable(){

  const table =
  document.getElementById("tableBody");

  table.innerHTML = "";

  dataTransaksi.forEach((item,index)=>{

    table.innerHTML +=
    `
    <tr>

      <td>${item.jenis}</td>

    <td>

  Rp ${
    item.range
    .split("-")
    .map(n =>
      Number(n.trim())
      .toLocaleString("id-ID")
    )
    .join(" - ")
  }

</td>

      <td>Rp ${Number(item.biaya).toLocaleString("id-ID")}</td>

      <td>Rp ${Number(item.bank).toLocaleString("id-ID")}</td>

      <td>${item.kategori}</td>

      <td>${item.efek}</td>

        <td class="aksi-cell">

  <div class="action-box">

    <button class="action-btn"
            onclick="toggleAction(${index})">

      ⋮

    </button>

    <div class="action-menu"
         id="actionMenu${index}">

      <div onclick="editData(${index})">
        ✏️ Edit
      </div>

      <div onclick="hapusData(${index})">
        🗑️ Hapus
      </div>

    </div>

  </div>

</td>

    </tr>
    `;
  });

  localStorage.setItem(
    "dataTransaksi",
    JSON.stringify(dataTransaksi)
  );

}

/* SIMPAN */

function simpanData(){

  const jenis =
  document.getElementById("jenisTransaksi").value;

  const range =
  document.getElementById("rangeNominal").value;

  const biaya =
  document.getElementById("biayaAdmin").value;

  const bank =
  document.getElementById("adminBank").value;

  const kategori =
  document.getElementById("kategori").value;

  const efek =
  document.getElementById("efekKategori").value;

  if(
    jenis === "" ||
    range === "" ||
    biaya === "" ||
    bank === ""
  ){

    alert("Isi semua data dulu");

    return;
  }

  const data = {

    jenis,
    range,
    biaya,
    bank,
    kategori,
    efek

  };

  /* EDIT */

  if(editIndex !== null){

    dataTransaksi[editIndex] = data;

    editIndex = null;

  }else{

    /* TAMBAH */

    dataTransaksi.push(data);

  }

  renderTable();

  resetForm();

  closePopup();

}

/* RESET */

function resetForm(){

  document.getElementById("jenisTransaksi").value = "";

  document.getElementById("rangeNominal").value = "";

  document.getElementById("biayaAdmin").value = "";

  document.getElementById("adminBank").value = "";

}

/* HAPUS */

function hapusData(index){

  if(confirm("Hapus data ini?")){

    dataTransaksi.splice(index,1);

    renderTable();

  }

}

/* EDIT */

function editData(index){

  const item =
  dataTransaksi[index];

  document.getElementById("jenisTransaksi").value =
  item.jenis;

  document.getElementById("rangeNominal").value =
  item.range;

  document.getElementById("biayaAdmin").value =
  item.biaya;

  document.getElementById("adminBank").value =
  item.bank;

  document.getElementById("kategori").value =
  item.kategori;

  document.getElementById("efekKategori").value =
  item.efek;

  editIndex = index;

  openPopup();

}

/* TOGGLE MENU */

function toggleAction(index){

  const menu =
  document.getElementById(`actionMenu${index}`);

  const isOpen =
  menu.style.display === "block";

  document
  .querySelectorAll(".action-menu")
  .forEach(menu=>{

    menu.style.display = "none";

  });

  menu.style.display =
  isOpen ? "none" : "block";

}

/* FIRST LOAD */

renderTable();


  /* SORT A-Z */

function sortAZ(){

  dataTransaksi.sort((a,b)=>

    a.jenis.localeCompare(b.jenis)

  );

  renderTable();

}

/* SORT Z-A */

function sortZA(){

  dataTransaksi.sort((a,b)=>

    b.jenis.localeCompare(a.jenis)

  );

  renderTable();

}

  /* AUTO SYNC */

function syncKategori(){

  const kategori =
  document.getElementById("kategori").value;

  const efek =
  document.getElementById("efekKategori");

  if(kategori === "Saldo In"){

    efek.value = "Cash Out";

  }

  else if(kategori === "Saldo Out"){

    efek.value = "Cash In";

  }

  else{

    efek.value = "None";

  }

}

  /* TOGGLE SORT MENU */

function toggleSortMenu(){

  const menu =
  document.getElementById("sortMenu");

  if(menu.style.display === "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";

  }

}
  window.addEventListener("click", function(e){

  if(!e.target.closest(".sort-dropdown-box")){

    document.getElementById("sortMenu")
    .style.display = "none";

  }

});

</script>

</body>
</html>
