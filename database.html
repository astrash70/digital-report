<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */

.topbar{

  width:100%;

  height:75px;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #179647
  );

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 20px;

  color:white;

  position:sticky;

  top:0;

  z-index:999;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.15);
}

/* BACK BUTTON */

.back-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:34px;

  font-weight:900;

  color:white;

  cursor:pointer;

  transition:0.2s;

  line-height:1;

  padding:4px 10px;
}
  
.back-btn:hover{

  transform:scale(1.05);

  background:
  rgba(255,255,255,0.22);
}

/* TITLE */

.title{

  font-size:20px;

  font-weight:bold;
}

/* PLUS BUTTON */

.plus-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:42px;

  font-weight:300;

  color:white;

  cursor:pointer;

  transition:0.25s;

  position:relative;

  padding:0 6px;

  line-height:1;
}

.plus-btn:hover{

  transform:rotate(90deg) scale(1.08);

  opacity:0.8;
}

/* DROPDOWN */

.plus-menu{

  position:absolute;

  top:60px;

  right:0;

  width:180px;

  background:white;

  border-radius:18px;

  overflow:hidden;

  display:none;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.15);
}

/* ITEM */

.plus-menu div{

  padding:14px;

  color:#222;

  font-size:14px;

  cursor:pointer;

  transition:0.2s;
}

.plus-menu div:hover{

  background:#f3f3f3;
}

/* CONTENT */

.content{

  padding:20px;
}

/* CARD */

.data-card{

  background:white;

  border-radius:22px;

  padding:18px;

  margin-bottom:14px;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.08);
}

.data-card h3{

  color:#0a6b2d;

  margin-bottom:8px;
}

.data-card p{

  color:#666;

  font-size:14px;
}

/* MOBILE */

@media(max-width:600px){

  .topbar{

    height:65px;

    padding:0 14px;
  }

  .title{

    font-size:17px;
  }

  .plus-menu{

    width:160px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar">

  <!-- BACK -->

<div class="back-btn"
     onclick="history.back()">

  ❮

</div>

  <!-- TITLE -->

  <div class="title">
    Database
  </div>

  <!-- PLUS -->

 <div class="plus-btn"
     onclick="toggleMenu()">

  +

  <div class="plus-menu"
       id="plusMenu">

    <div>Tambah Pelanggan</div>

    <div>Tambah Transaksi</div>

    <div>Tambah Admin</div>

  </div>

</div>

    <!-- DROPDOWN -->

    <div class="plus-menu"
         id="plusMenu">

      <div onclick="alert('Tambah Pelanggan')">
        Tambah Pelanggan
      </div>

      <div onclick="alert('Tambah Transaksi')">
        Tambah Transaksi
      </div>

      <div onclick="alert('Tambah Admin')">
        Tambah Admin
      </div>

    </div>

  </div>

</div>

<!-- CONTENT -->

<div class="content">

  <div class="data-card">

    <h3>Astri Cell</h3>

    <p>152 transaksi</p>

  </div>

  <div class="data-card">

    <h3>Putra Jaya</h3>

    <p>121 transaksi</p>

  </div>

</div>

<script>

/* TOGGLE MENU */

function toggleMenu(){

  const menu =
  document.getElementById("plusMenu");

  if(menu.style.display === "block"){

    menu.style.display = "none";

  }else{

    menu.style.display = "block";
  }

}

/* CLOSE MENU */

window.onclick = function(e){

  if(!e.target.closest(".plus-btn")){

    document.getElementById("plusMenu")
    .style.display = "none";
  }

}

</script>

</body>
</html>
