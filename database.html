<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Database</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */

.topbar{

  width:100%;

  height:75px;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #179647
  );

  display:flex;

  align-items:center;

  justify-content:space-between;

  padding:0 20px;

  color:white;

  position:sticky;

  top:0;

  z-index:999;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.15);
}

/* BACK BUTTON */

.back-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:
  clamp(
    28px,
    4vw,
    42px
  );

  font-weight:900;

  color:white;

  cursor:pointer;

  transition:0.2s;

  line-height:1;

  padding:
  clamp(2px,1vw,6px)
  clamp(6px,1vw,12px);
}
  
.back-btn:hover{

  transform:scale(1.05);

  background:
  rgba(255,255,255,0.22);
}

/* TITLE */

.title{

  font-size:20px;

  font-weight:bold;
}

/* PLUS BUTTON */

.plus-btn{

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:
  clamp(
    34px,
    5vw,
    52px
  );

  font-weight:200;

  color:white;

  cursor:pointer;

  transition:0.25s;

  position:relative;

  padding:
  clamp(2px,1vw,6px);

  line-height:1;
}


/* CONTENT */

.content{

  padding:20px;
}

/* CARD */

.data-card{

  background:white;

  border-radius:22px;

  padding:18px;

  margin-bottom:14px;

  box-shadow:
  0 5px 15px rgba(0,0,0,0.08);
}

.data-card h3{

  color:#0a6b2d;

  margin-bottom:8px;
}

.data-card p{

  color:#666;

  font-size:14px;
}

/* MOBILE */

@media(max-width:600px){

  .topbar{

    height:65px;

    padding:0 14px;
  }

  .title{

    font-size:17px;
  }
}

/* OVERLAY */

.popup-overlay{

  position:fixed;

  inset:0;

  background:
  rgba(0,0,0,0.45);

  backdrop-filter:blur(4px);

  display:none;

  align-items:center;

  justify-content:center;

  padding:20px;

  z-index:5000;
}

/* FORM */

.popup-form{

  width:100%;

  max-width:520px;

  max-height:90vh;

  overflow-y:auto;

  background:white;

  border-radius:30px;

  padding:24px;

  box-shadow:
  0 20px 50px rgba(0,0,0,0.25);

  animation:popupShow 0.25s ease;
}

/* ANIMATION */

@keyframes popupShow{

  from{

    opacity:0;

    transform:
    translateY(20px)
    scale(0.96);
  }

  to{

    opacity:1;

    transform:
    translateY(0)
    scale(1);
  }

}

/* HEADER */

.popup-header{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-bottom:24px;
}

.popup-header h2{

  color:#0a6b2d;

  font-size:
  clamp(20px,2vw,28px);
}

.popup-header span{

  font-size:28px;

  cursor:pointer;

  color:#555;
}

/* FORM GROUP */

.form-group{

  display:flex;

  flex-direction:column;

  margin-bottom:18px;
}

.form-group label{

  font-size:14px;

  font-weight:600;

  color:#333;

  margin-bottom:8px;
}

/* INPUT */

.form-group input,
.form-group select{

  width:100%;

  border:none;

  outline:none;

  background:#f3f3f3;

  border-radius:16px;

  padding:14px 16px;

  font-size:14px;

  transition:0.2s;
}

.form-group input:focus,
.form-group select:focus{

  background:#ebebeb;

  box-shadow:
  0 0 0 2px rgba(10,107,45,0.15);
}

/* BUTTON */

.save-btn{

  width:100%;

  border:none;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #16a34a
  );

  color:white;

  padding:16px;

  border-radius:18px;

  font-size:15px;

  font-weight:bold;

  cursor:pointer;

  margin-top:10px;

  transition:0.25s;
}

.save-btn:hover{

  transform:translateY(-2px);

  opacity:0.95;
}

/* MOBILE */

@media(max-width:600px){

  .popup-form{

    border-radius:24px;

    padding:18px;
  }

  .form-group input,
  .form-group select{

    padding:13px;
  }

}

/* TABLE WRAPPER */

.table-wrapper{

  width:100%;

  overflow-x:auto;

  background:white;

  border-radius:24px;

  box-shadow:
  0 5px 20px rgba(0,0,0,0.08);

  overflow:hidden;
}

/* TABLE */

table{

  width:100%;

  border-collapse:collapse;

  min-width:900px;
}

/* HEAD */

thead{

  background:
  rgba(22,163,74,0.12);
}

th{

  padding:18px;

  text-align:left;

  color:#0a6b2d;

  font-size:14px;

  font-weight:700;

  white-space:nowrap;
}

/* BODY */

td{

  padding:16px 18px;

  font-size:14px;

  color:#333;

  border-top:
  1px solid #f1f1f1;
}

/* ROW */

tbody tr{

  transition:0.2s;
}

tbody tr:hover{

  background:#fafafa;
}

/* MOBILE */

@media(max-width:600px){

  th,
  td{

    padding:14px;

    font-size:13px;
  }

}

  
</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar">

  <!-- BACK -->

<div class="back-btn"
     onclick="history.back()">

  ❮

</div>

  <!-- TITLE -->

  <div class="title">
    Database
  </div>

  <!-- PLUS -->

 <div class="plus-btn"
     onclick="openPopup()">

  +

</div>
</div>
  

<!-- CONTENT -->
<div class="content">
  <div class="table-wrapper">

  <table>

    <!-- HEAD -->

    <thead>

      <tr>

        <th>Jenis Transaksi</th>

        <th>Range Nominal</th>

        <th>Biaya Admin</th>

        <th>Admin Bank</th>

        <th>Kategori</th>

        <th>Efek</th>

      </tr>

    </thead>

    <!-- BODY -->

    <tbody id="tableBody">

    </tbody>

  </table>

</div>
</div>

<!-- POPUP FORM -->

<div class="popup-overlay"
     id="popupOverlay">

  <div class="popup-form">

    <!-- HEADER -->

    <div class="popup-header">

      <h2>Tambah Data</h2>

      <span onclick="closePopup()">
        ✕
      </span>

    </div>

    <!-- FORM -->

<div class="form-group">

  <label>Jenis Transaksi</label>

  <input type="text"
         id="jenisTransaksi"
         placeholder="Contoh: Transfer BCA">

</div>

<div class="form-group">

  <label>Range Nominal</label>

  <input type="text"
         id="rangeNominal"
         placeholder="Contoh: 10.000 - 100.000">

</div>

<div class="form-group">

  <label>Biaya Admin</label>

  <input type="number"
         id="biayaAdmin"
         placeholder="Masukkan nominal">

</div>

<div class="form-group">

  <label>Admin Bank</label>

  <input type="number"
         id="adminBank"
         placeholder="Masukkan nominal">

</div>

<div class="form-group">

  <label>Kategori</label>

  <select id="kategori">

    <option>Saldo In</option>

    <option>Saldo Out</option>

  </select>

</div>

<div class="form-group">

  <label>Efek Kategori</label>

  <select id="efekKategori">

    <option>Cash In</option>

    <option>Cash Out</option>

  </select>

</div>
    
    <!-- BUTTON -->

   <button class="save-btn"
        onclick="simpanData()">

  Simpan Data

</button>

</div>

<script>

  /* OPEN */

function openPopup(){

  document.getElementById("popupOverlay")
  .style.display = "flex";
}

/* CLOSE */

function closePopup(){

  document.getElementById("popupOverlay")
  .style.display = "none";
}

/* CLOSE KLIK LUAR */

window.addEventListener("click", function(e){

  const popup =
  document.getElementById("popupOverlay");

  if(e.target === popup){

    popup.style.display = "none";
  }

});

  /* SIMPAN DATA */

function simpanData(){

  /* AMBIL VALUE */

  const jenis =
  document.getElementById("jenisTransaksi").value;

  const range =
  document.getElementById("rangeNominal").value;

  const biaya =
  document.getElementById("biayaAdmin").value;

  const bank =
  document.getElementById("adminBank").value;

  const kategori =
  document.getElementById("kategori").value;

  const efek =
  document.getElementById("efekKategori").value;

  /* VALIDASI */

  if(
    jenis === "" ||
    range === "" ||
    biaya === "" ||
    bank === ""
  ){

    alert("Isi semua data dulu");

    return;
  }

  /* TAMBAH ROW */

  const table =
  document.getElementById("tableBody");

  const row =
  `
  <tr>

    <td>${jenis}</td>

    <td>${range}</td>

    <td>Rp ${Number(biaya).toLocaleString("id-ID")}</td>

    <td>Rp ${Number(bank).toLocaleString("id-ID")}</td>

    <td>${kategori}</td>

    <td>${efek}</td>

  </tr>
  `;

  table.innerHTML += row;

  /* RESET */

  document.getElementById("jenisTransaksi").value = "";

  document.getElementById("rangeNominal").value = "";

  document.getElementById("biayaAdmin").value = "";

  document.getElementById("adminBank").value = "";

  /* CLOSE POPUP */

  closePopup();

}


</script>

</body>
</html>
