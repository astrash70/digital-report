<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
  margin:0;

  font-family:Arial,sans-serif;

  background-image:url("bg-batik.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;

  min-height:100vh;
}

    /* GREETING */

    .greeting{

  font-size:18px;

  font-weight:bold;

  color:white;

  margin-bottom:16px;

  padding-left:8px;

  text-shadow:
  0 4px 10px rgba(0,0,0,0.25);
}


    /* TOTAL CARD */

   .total-card{
     z-index:2;
  width:100%;

  min-height:190px;

  padding:28px 24px;

  border-radius:30px;

  margin-bottom:12px;

  color:white;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    rgba(10,70,25,0.88),
    rgba(24,120,55,0.78)
  ),

  url("batik.png");

  background-size:cover;

  background-position:center;

  box-shadow:
  0 10px 35px rgba(0,0,0,0.22);

  border:
  1px solid rgba(255,255,255,0.12);
}

    .total-card::before{
  content:"";

  position:absolute;

  inset:0;

  background:
  linear-gradient(
    120deg,
    rgba(255,255,255,0.12),
    transparent,
    rgba(255,255,255,0.05)
  );
overflow:hidden;
  pointer-events:none;
}

    .total-title{

  font-size:14px;

  margin-bottom:18px;

  opacity:0.88;

  letter-spacing:0.3px;

  transform:translateY(-6px);
}

   .total-amount{

  font-size:
  clamp(
    28px,
    5vw,
    56px
  );

  font-weight:bold;

  line-height:1.1;

  white-space:nowrap;
}


    /* BOX CONTAINER */

.box-container{

  display:grid;

  grid-template-columns:
  repeat(2, minmax(0,1fr));

  gap:10px;

  margin-top:10px;
}


    /* BOX */

   .box{
     z-index:2;

  flex:1;

  min-height:100px;

  border-radius:24px;

  padding:22px;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #fff7c7,
    #f3d54e
  );

  box-shadow:
  0 8px 22px rgba(0,0,0,0.12);

  border:
  1px solid rgba(255,255,255,0.35);

  display:flex;

  flex-direction:column;

  justify-content:center;
}
    .box::before{

  content:"";

  position:absolute;

  inset:0;

  background-image:url("ICON/batik.png");

  background-size:cover;

  background-position:center;

  opacity:0.06;

  pointer-events:none;
}

    .box-title{

  font-size:13px;

  margin-bottom:12px;

  letter-spacing:0.3px;

  transform:translateY(-4px);

  font-weight:600;

  opacity:0.75;
}

    .box-amount{

  font-size:
  clamp(
    16px,
    2.5vw,
    34px
  );

  font-weight:bold;

  color:#0a6b2d;

  line-height:1.1;

  white-space:nowrap;
}

.dashboard{

  position:relative;

  z-index:2;

  width:100%;

  max-width:1680px;

  min-height:100vh;

  padding:20px;

  margin:auto;
}

  .card-wrapper{

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.98),
    rgba(245,245,245,0.95)
  );

  border-radius:42px 42px 42px 42px;

  padding:8px;
    
  margin-top:18px;

  width:100%;

  position:relative;

  overflow:hidden;

  box-shadow:

0 10px 25px rgba(0,0,0,0.10),

0 20px 60px rgba(0,0,0,0.18),

0 0 40px rgba(255,215,0,0.10),

inset 0 1px 0 rgba(255,255,255,0.9);

}
    .card-wrapper::before{

  content:"";

  position:absolute;

  top:-55px;

  left:0;

  width:100%;

  height:90px;

  background:#f7f7f7;

  border-radius:
  0 0 50% 50%;
}


/* HAPUS INI TOTAL */
.card-wrapper::before{
  display:none;
}

@media(max-width:600px){

  .greeting{
    font-size:24px;
  }
  .total-card{
    padding:22px 20px;
    min-height:145px;
}

  .box{
  padding:16px;
  min-height:95px;
}

}
  </style>
</head>
<body>

<div class="dashboard">

<!-- GREETING -->
<div class="greeting">
  Hallo, <span id="namaToko">...</span> 👋
</div>

<div class="card-wrapper">

    <!-- TOTAL CARD -->

  <div class="total-card">

    <div class="total-title">
      Total Cash + Saldo Hari Ini
    </div>

    <div class="total-amount" id="totalSemua">
      Rp 0
    </div>

  </div>



  <!-- CASH & SALDO -->

  <div class="box-container">


    <!-- CASH -->

    <div class="box">

      <div class="box-title">
        Cash
      </div>

      <div class="box-amount" id="cashAmount">
        Rp 0
      </div>

    </div>



    <!-- SALDO -->

    <div class="box">

      <div class="box-title">
        Saldo
      </div>

      <div class="box-amount" id="saldoAmount">
        Rp 0
      </div>

    </div>


  </div>





<script type="module">

/* IMPORT FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



/* INIT FIREBASE */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



/* CEK USER LOGIN */

onAuthStateChanged(auth, async (user) => {

  if(user){

    /* AMBIL DATA USER */

    const docRef = doc(db, "users", user.uid);

    const docSnap = await getDoc(docRef);


    if(docSnap.exists()){

      const data = docSnap.data();


      /* TAMPILKAN NAMA TOKO */

      document.getElementById("namaToko").innerText =
      data.namaToko;

    }



    /* DATA SEMENTARA */

    let cash = 500000;

    let saldo = 250000;



    /* TAMPILKAN CASH */

    document.getElementById("cashAmount").innerText =
    "Rp " + cash.toLocaleString("id-ID");



    /* TAMPILKAN SALDO */

    document.getElementById("saldoAmount").innerText =
    "Rp " + saldo.toLocaleString("id-ID");



    /* TOTAL */

    const total = cash + saldo;



    /* TAMPILKAN TOTAL */

    document.getElementById("totalSemua").innerText =
    "Rp " + total.toLocaleString("id-ID");

  }

});

</script>
</div>

</div>
</body>
  
</html>
