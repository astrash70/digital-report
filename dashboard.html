<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

 /* HEADER TOP */

.top-bg{

  position:fixed;

  top:0;
  left:0;

  width:100%;

  height:70px;

  background-image:url("bg 1.png");

  background-repeat:no-repeat;

  background-size:100% auto;

background-position:center -12px;
  z-index:999;

  pointer-events:none;
}


/* BIKIN CONTENT TURUN */

.dashboard{

  position:relative;

  z-index:10;

  padding-top:55px;
}
@media(max-width:768px){

  .top-bg{

    height:55px;

    background-image:url("m 1.png");

    background-size:100% auto;

    background-position:center top;

  }

}
    
  body::before{

  content:"";

  position:absolute;

  top:0;
  left:0;

  width:100%;

  height:320px;

  background-image:url("bg 1.png");

  background-repeat:no-repeat;

  background-size:100% auto;

  background-position:top center;

  border-bottom-left-radius:40px;
  border-bottom-right-radius:40px;

  overflow:hidden;
  z-index:-1;

  pointer-events:none;
}
   /* MOBILE */

@media(max-width:768px){

  body::before{

    height:210px;

    /* INI KUNCINYA */
    background-size:100% 100%;

    background-position:top center;

  }

}
   .greeting{

  position:fixed;

  top:18px;

  left:20px;

  z-index:1000;

  font-size:18px;

  font-weight:bold;

  color:white;

  text-shadow:
  0 4px 10px rgba(0,0,0,0.25);

}

    /* TOTAL CARD */

  .total-card{
     z-index:2;
  width:100%;

  min-height:160px;

  padding:8px 24px 24px;

  border-radius:30px;

  margin-bottom:12px;

  color:white;

  position:relative;

  overflow:hidden;

  background:
linear-gradient(
135deg,
rgba(255,255,255,0.16),
rgba(255,255,255,0.05)
);

  background-size:cover;

  background-position:center;

  backdrop-filter:
blur(18px)
saturate(180%);

border:
1px solid rgba(255,255,255,.18);

box-shadow:

0 10px 35px rgba(0,0,0,.12),

inset 0 1px 1px rgba(255,255,255,.55);

    .total-card::before{
  content:"";

  position:absolute;

  inset:0;

  background:
  linear-gradient(
    120deg,
    rgba(255,255,255,0.12),
    transparent,
    rgba(255,255,255,0.05)
  );
overflow:hidden;
  pointer-events:none;
}

    .total-title{

  font-size:12px;

  margin-bottom:18px;

  opacity:0.88;

  letter-spacing:0.3px;
}

   .total-amount{

  font-size:
  clamp(
    33px,
    5vw,
    56px
  );

  font-weight:bold;

  line-height:1.1;

  white-space:nowrap;
}


    /* BOX CONTAINER */

.box-container{

  display:grid;

  grid-template-columns:
  repeat(2, minmax(0,1fr));

  gap:10px;

  margin-top:10px;
}


    /* BOX */

   .box{
  z-index:2;

  flex:1;

  min-height:55px;

  border-radius:24px;

  padding:10px 24px 24px;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #fff7c7,
    #f3d54e
  );

  box-shadow:
  0 8px 22px rgba(0,0,0,0.12);

  border:
  1px solid rgba(255,255,255,0.35);

  display:flex;

  flex-direction:column;

  justify-content:flex-start;
}
    .box::before{

  content:"";

  position:absolute;

  inset:0;

  background-image:url("ICON/batik.png");

  background-size:cover;

  background-position:center;

  opacity:0.06;

  pointer-events:none;
}

    .box-title{

  font-size:10px;

  margin-bottom:12px;

  letter-spacing:0.3px;

  font-weight:600;

  opacity:0.75;
}

    .box-amount{

  font-size:
  clamp(
    1px,
    2.5vw,
    34px
  );

  font-weight:bold;

  color:#0a6b2d;

  line-height:1.1;

  white-space:nowrap;
}

.dashboard{

  position:relative;

  z-index:10;

  width:100%;

  max-width:1680px;

  min-height:100vh;

  padding:20px;

  margin:auto;
}

@media(max-width:600px){

  .dashboard{
    padding:12px;
  }

  .greeting{
    font-size:16px;
    margin-bottom:10px;
  }

  /* TOTAL CARD */
  .total-card{

    min-height:100px;

    padding:15px;

    border-radius:20px;

    margin-bottom:8px;
  }

  .total-title{

    font-size:10px;

    margin-bottom:10px;
  }

  .total-amount{

    font-size:clamp(24px, 6vw, 34px);
  }

  /* MINI CARD */
  .box{

    min-height:65px;

    padding:10px;

    border-radius:16px;
  }

  .box-title{

    font-size:8px;

    margin-bottom:6px;
  }

  .box-amount{

    font-size:clamp(13px, 3.5vw, 18px);
  }

  .box-container{
    gap:6px;
  }

}
    /* MENU */

.menu-container{

  margin-top:8px; /* tadinya 18px */

  padding-bottom:2px; /* biar bawahnya ga kosong */

  display:flex;

  justify-content:space-around;

  align-items:center;

  gap:clamp(10px, 2vw, 28px);
}
    
.menu-item{

  padding:8px 12px;

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  gap:6px;

  background:transparent;

  border:none;

  cursor:pointer;
}

.menu-item img{

  width:clamp(34px, 5vw, 72px);

  height:clamp(34px, 5vw, 72px);

  object-fit:contain;
}

.menu-item span{

  font-size:clamp(10px, 1.8vw, 15px);

  font-weight:600;

  color:#0a6b2d;

  letter-spacing:0.2px;

  opacity:0.9;
}

    /* MENU VERTIKAL */

.vertical-menu{

  display:flex;

  flex-direction:column;

  gap:clamp(14px, 2vw, 24px);

  margin-top:20px;
}

.vertical-item{

  width:100%;

  display:flex;

  flex-direction:row !important;

  align-items:flex-end !important;

  justify-content:flex-start !important;

  gap:5px;

  padding:18px 20px;

  border-radius:24px;

  background:white;
  border-right:5px solid #0a6b2d;
  box-shadow:
0 10px 25px rgba(0,0,0,0.08),
0 4px 10px rgba(0,0,0,0.04),
0 0 0 1px rgba(10,107,45,0.05);

  transition:0.25s ease;
}
    .vertical-item b{

  margin-left:6px;

  font-size:clamp(16px,2vw,24px);

  color:#0a6b2d;

  font-weight:700;

  align-self:center;
}

.vertical-item img{

  width:clamp(42px, 5vw, 64px);

  height:clamp(42px, 5vw, 64px);

  object-fit:contain;

  flex-shrink:0;
}

.vertical-item span{

  font-size:clamp(8px, 1vw, 11px);

  font-weight:400;

  color:#0a6b2d;

  opacity:0.8;

  line-height:1;

  margin-bottom:0.5px;

  letter-spacing:0.2px;

  margin-left:auto;

  margin-right:5px;
}
    
/* TOP CUSTOMER */

.top-customer-card{

  margin-top:18px;

  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.96),
    rgba(245,245,245,0.92)
  );

  border-radius:26px;

  padding:
  clamp(14px, 2vw, 22px);

  box-shadow:
  0 8px 24px rgba(0,0,0,0.07);

  border:
  1px solid rgba(255,255,255,0.7);
}

.top-customer-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:10px;

  margin-bottom:16px;
}

.top-customer-header h2{

  font-size:
  clamp(16px, 2vw, 24px);

  color:#0a6b2d;

  font-weight:700;
}

.top-customer-header span{

  font-size:
  clamp(10px, 1.5vw, 14px);

  color:#777;

  white-space:nowrap;
}

.customer-list{

  display:flex;

  flex-direction:column;

  gap:10px;
}

.customer-item{

  display:flex;

  align-items:center;

  gap:12px;

  background:
  rgba(255,255,255,0.72);

  border-radius:18px;

  padding:
  clamp(10px, 1.5vw, 16px);

  transition:0.25s ease;
}

.customer-rank{

  width:
  clamp(42px, 5vw, 54px);

  height:
  clamp(42px, 5vw, 54px);

  border-radius:50%;

  background:
  linear-gradient(
    135deg,
    #0a6b2d,
    #18a34a
  );

  color:white;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:
  clamp(18px, 2vw, 22px);

  font-weight:bold;

  flex-shrink:0;
}

.customer-info h3{

  font-size:
  clamp(14px, 2vw, 20px);

  color:#222;

  line-height:1.1;
}

.customer-info p{

  font-size:
  clamp(11px, 1.6vw, 14px);

  color:#777;

  margin-top:3px;
}

/* KHUSUS HP */

@media(max-width:600px){

  .top-customer-card{

    border-radius:22px;

    padding:14px;
  }

  .top-customer-header{

    margin-bottom:12px;
  }

  .customer-item{

    padding:10px 12px;

    border-radius:16px;

    gap:10px;
  }

  .customer-rank{

    width:34px;
    height:34px;

    font-size:16px;
  }

  .customer-info h3{

    font-size:13px;
  }

  .customer-info p{

    font-size:11px;
  }

}

    /* HEADER */

.top-customer-header{

  display:flex;

  justify-content:space-between;

  align-items:center;

  margin-bottom:16px;

  position:relative;
}

/* FILTER */

.filter-box{
  position:relative;
}

.filter-btn{

  border:none;

  background:
  rgba(10,107,45,0.08);

  color:#0a6b2d;

  padding:8px 12px;

  border-radius:12px;

  font-size:12px;

  font-weight:600;

  cursor:pointer;

  transition:0.2s;
}

.filter-btn:hover{

  background:
  rgba(10,107,45,0.14);
}

/* DROPDOWN */

.filter-dropdown{

  position:absolute;

  top:45px;

  right:0;

  width:120px;

  background:white;

  border-radius:14px;

  overflow:hidden;

  box-shadow:
  0 10px 25px rgba(0,0,0,0.12);

  display:none;

  z-index:100;
}

.filter-dropdown div{

  padding:12px;

  font-size:13px;

  cursor:pointer;

  transition:0.2s;
}

.filter-dropdown div:hover{

  background:#f3f3f3;
}

/* MOBILE */

@media(max-width:600px){

  .filter-btn{

    padding:7px 10px;

    font-size:11px;
  }

  .filter-dropdown{

    width:105px;
  }

  .filter-dropdown div{

    font-size:12px;

    padding:10px;
  }

}

   
    
  </style>
</head>
<body>

<div class="top-bg"></div>

<!-- GREETING -->
<div class="greeting">
  Hallo, <span id="namaToko">...</span> 👋
</div>

<div class="dashboard">

    <!-- TOTAL CARD -->

  <div class="total-card">

    <div class="total-title">
      Financial Overview
    </div>

    <div class="total-amount" id="totalSemua">
      Rp 0
    </div>


  <!-- CASH & SALDO -->

  <div class="box-container">


    <!-- CASH -->

    <div class="box">

      <div class="box-title">
        Cash On Hand
      </div>

      <div class="box-amount" id="cashAmount">
        Rp 0
      </div>

    </div>

    <!-- SALDO -->

    <div class="box">

      <div class="box-title">
        Account Balance
      </div>

      <div class="box-amount" id="saldoAmount">
        Rp 0
      </div>

    </div>


  </div>
  
<!-- MENU -->

<div class="menu-container">

  <div class="menu-item">
    <img src="input.png">
    <span>Input</span>
  </div>

  <div class="menu-item" onclick="window.location.href='database.html'">
  <img src="database.png">
  <span>Database</span>
</div>

  <div class="menu-item">
    <img src="report.png">
    <span>Report</span>
  </div>

</div>
</div>
  <!-- MENU VERTIKAL -->

<div class="vertical-menu">

 <div class="menu-item vertical-item">
  <img src="transaction volume.png">

    <b id="totalTransaksi">
    Rp 0
  </b>
   <span>
    Transaction Volume
  </span>
</div>

<div class="menu-item vertical-item">
  <img src="admin.png">

    <b id="totalAdmin">
    Rp 0
  </b>
  <span>
    Admin
  </span>
</div>

<div class="menu-item vertical-item">
  <img src="charge.png">

  <b id="totalCharge">
    Rp 0
  </b>
  <span>
    Charge
  </span>
</div>

 <!-- TOP CUSTOMER -->

<div class="top-customer-card">

  <div class="top-customer-header">

    <h2 id="topTitle">
      Top 10 Pelanggan
    </h2>

    <div class="filter-box">

      <button class="filter-btn" onclick="toggleFilter()">
        ☰ Filter
      </button>

      <div class="filter-dropdown" id="filterDropdown">

        <div onclick="setTop(5)">
          Top 5
        </div>

        <div onclick="setTop(10)">
          Top 10
        </div>

        <div onclick="setTop(50)">
          Top 50
        </div>

        <div onclick="setTop(100)">
          Top 100
        </div>

      </div>

    </div>

  </div>

  <div class="customer-list">

    <div class="customer-item">

      <div class="customer-rank">
        1
      </div>

      <div class="customer-info">

        <h3>Astri Cell</h3>

        <p>152 transaksi</p>

      </div>

    </div>

    <div class="customer-item">

      <div class="customer-rank">
        2
      </div>

      <div class="customer-info">

        <h3>Rizky Store</h3>

        <p>134 transaksi</p>

      </div>

    </div>

    <div class="customer-item">

      <div class="customer-rank">
        3
      </div>

      <div class="customer-info">

        <h3>Putra Jaya</h3>

        <p>121 transaksi</p>

      </div>

    </div>

  </div>

</div>
  
<script type="module">

/* IMPORT FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



/* INIT FIREBASE */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



/* CEK USER LOGIN */

onAuthStateChanged(auth, async (user) => {

  if(user){

    /* AMBIL DATA USER */

    const docRef = doc(db, "users", user.uid);

    const docSnap = await getDoc(docRef);


    if(docSnap.exists()){

      const data = docSnap.data();


      /* TAMPILKAN NAMA TOKO */

      document.getElementById("namaToko").innerText =
      data.namaToko;

    }



    /* DATA SEMENTARA */

    let cash = 500000;

    let saldo = 250000;



    /* TAMPILKAN CASH */

    document.getElementById("cashAmount").innerText =
    "Rp " + cash.toLocaleString("id-ID");



    /* TAMPILKAN SALDO */

    document.getElementById("saldoAmount").innerText =
    "Rp " + saldo.toLocaleString("id-ID");



    /* TOTAL */

    const total = cash + saldo;



    /* TAMPILKAN TOTAL */

    document.getElementById("totalSemua").innerText =
    "Rp " + total.toLocaleString("id-ID");

  }

});

  /* TOGGLE DROPDOWN */

window.toggleFilter = function(){

  const dropdown =
  document.getElementById("filterDropdown");

  if(dropdown.style.display === "block"){

    dropdown.style.display = "none";

  }else{

    dropdown.style.display = "block";
  }

}

/* GANTI TOP */

window.setTop = function(number){

  document.getElementById("topTitle")
  .innerText =
  `Top ${number} Pelanggan`;

  document.getElementById("filterDropdown")
  .style.display = "none";

  console.log("Filter Top:", number);

}  

</script>
</div>

</div>
</body>
  
</html>
