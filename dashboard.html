<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
  margin:0;

  font-family:Arial,sans-serif;

  background-image:url("bg-batik.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;

  min-height:100vh;
}

    /* GREETING */

    .greeting{
  font-size:18px;
  font-weight:bold;
  color:white;

  margin-bottom:25px;

  text-shadow:0 4px 10px rgba(0,0,0,0.25);
}


    /* TOTAL CARD */

   .total-card{
  width:100%;

  min-height:190px;

  padding:28px 24px;

  border-radius:30px;

  margin-bottom:18px;

  color:white;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    rgba(10,70,25,0.88),
    rgba(24,120,55,0.78)
  ),

  url("batik.png");

  background-size:cover;

  background-position:center;

  box-shadow:
  0 10px 35px rgba(0,0,0,0.22);

  border:
  1px solid rgba(255,255,255,0.12);
}

    .total-card::before{
  content:"";

  position:absolute;

  inset:0;

  background:
  linear-gradient(
    120deg,
    rgba(255,255,255,0.12),
    transparent,
    rgba(255,255,255,0.05)
  );

  pointer-events:none;
}

    .total-title{
  font-size:15px;
  margin-bottom:14px;
  opacity:0.85;
}

    .total-amount{
  font-size:42px;
  font-weight:bold;
}


    /* BOX CONTAINER */

.box-container{
  display:grid;

  grid-template-columns:1fr 1fr;

  gap:15px;

  margin-top:15px;
}


    /* BOX */

   .box{
  min-height:90px;

  background:rgba(255,255,255,0.16);

  backdrop-filter:blur(14px);

  border-radius:24px;

  padding:15px;

  color:white;

  box-shadow:0 8px 20px rgba(0,0,0,0.12);

  display:flex;
  flex-direction:column;
  justify-content:center;

  border:1px solid rgba(255,255,255,0.12);
}

    .box-title{
  font-size:14px;
  margin-bottom:10px;
  opacity:0.8;
}

    .box-amount{
  font-size:28px;
  font-weight:bold;
}

.dashboard{
  position:relative;
  z-index:2;

  width:100%;
  max-width:1200px;

  min-height:100vh;

  padding:20px;

  margin:auto;
}

   .card-wrapper{

  background:#ffffff;

  border-radius:36px;

  padding:14px;

  margin-top:18px;

  box-shadow:
  0 12px 30px rgba(0,0,0,0.18);

  width:100%;
}

@media(max-width:600px){

  .greeting{
    font-size:24px;
  }

  .total-amount{
    font-size:36px;
  }

  .box-amount{
    font-size:24px;
  }

  .total-card{
    padding:22px 18px;
    min-height:160px;
  }

  .box{
  padding:14px;
  min-height:75px;
}

}
  </style>
</head>
<body>

<div class="dashboard">

<!-- GREETING -->
<div class="greeting">
  Hallo, <span id="namaToko">...</span> 👋
</div>

<div class="card-wrapper">

    <!-- TOTAL CARD -->

  <div class="total-card">

    <div class="total-title">
      Total Cash + Saldo Hari Ini
    </div>

    <div class="total-amount" id="totalSemua">
      Rp 0
    </div>

  </div>



  <!-- CASH & SALDO -->

  <div class="box-container">


    <!-- CASH -->

    <div class="box">

      <div class="box-title">
        Cash
      </div>

      <div class="box-amount" id="cashAmount">
        Rp 0
      </div>

    </div>



    <!-- SALDO -->

    <div class="box">

      <div class="box-title">
        Saldo
      </div>

      <div class="box-amount" id="saldoAmount">
        Rp 0
      </div>

    </div>


  </div>





<script type="module">

/* IMPORT FIREBASE */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



/* INIT FIREBASE */

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



/* CEK USER LOGIN */

onAuthStateChanged(auth, async (user) => {

  if(user){

    /* AMBIL DATA USER */

    const docRef = doc(db, "users", user.uid);

    const docSnap = await getDoc(docRef);


    if(docSnap.exists()){

      const data = docSnap.data();


      /* TAMPILKAN NAMA TOKO */

      document.getElementById("namaToko").innerText =
      data.namaToko;

    }



    /* DATA SEMENTARA */

    let cash = 500000;

    let saldo = 250000;



    /* TAMPILKAN CASH */

    document.getElementById("cashAmount").innerText =
    "Rp " + cash.toLocaleString("id-ID");



    /* TAMPILKAN SALDO */

    document.getElementById("saldoAmount").innerText =
    "Rp " + saldo.toLocaleString("id-ID");



    /* TOTAL */

    const total = cash + saldo;



    /* TAMPILKAN TOTAL */

    document.getElementById("totalSemua").innerText =
    "Rp " + total.toLocaleString("id-ID");

  }

});

</script>
</div>

</div>
</body>
  
</html>
