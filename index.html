<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>

  <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  position:relative;

  background:
  radial-gradient(
    circle at top left,
    #edf3e7,
    #d7e2d0,
    #c6d3bf
  );
}


/* CONTAINER */

.container{

  width:760px;

  height:760px;

  border-radius:50%;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  background:
  rgba(255,255,255,0.08);

  backdrop-filter:blur(30px);

  border:
  2px solid rgba(255,255,255,0.38);

  box-shadow:
  inset 0 0 50px rgba(255,255,255,0.12);

}


/* GLOW DALAM */

.container::before{

  content:"";

  position:absolute;

  width:280px;
  height:280px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(161,255,88,0.55),
    transparent 70%
  );

  filter:blur(30px);

  left:40px;

  top:120px;
}



/* BLOB DALAM KANAN */

.container::after{

  content:"";

  position:absolute;

  width:240px;
  height:240px;

  border-radius:35%;

  background:
  radial-gradient(
    circle,
    rgba(85,255,145,0.45),
    transparent 70%
  );

  filter:blur(35px);

  right:70px;

  top:80px;
}

   .logo{
  width:110px;
  margin-bottom:25px;
  position:relative;
  z-index:5;
}
    .input-group{
      margin-bottom:15px;
      text-align:left;
    }

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
      display:block;
    }

   .input-group input{

  width:530px;

  height:78px;

  border-radius:28px;

  background:
  rgba(255,255,255,0.16);

  border:
  1px solid rgba(255,255,255,0.4);

  font-size:20px;
}

  .login-btn{

  width:280px;

  height:78px;

  border-radius:45px;

  font-size:28px;

  letter-spacing:2px;
}
    .login-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

    .signin-text{
      margin-top:18px;
      font-size:13px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}

    @media(max-width:768px){

  .container{

    width:95vw;

    height:95vw;

    min-height:unset;
  }

  .title{

    font-size:38px;
  }

  .input-group input{

    width:78vw;

    height:62px;
  }

  .login-btn{

    width:220px;

    height:62px;
  }

}
    .wave{

  position:absolute;

  width:1200px;

  height:500px;

  z-index:1;

  pointer-events:none;

  opacity:0.45;

  overflow:hidden;
}
    .wave-left{

  left:-420px;

  bottom:-120px;

  transform:
  rotate(-12deg);
}
    .wave-right{

  right:-420px;

  top:-80px;

  transform:
  rotate(18deg);
}
    .wave::before{

  content:"";

  position:absolute;

  inset:0;

  background:
  repeating-linear-gradient(
    to bottom,

    rgba(0,70,35,0.0) 0px,

    rgba(0,70,35,0.0) 6px,

    rgba(8,74,45,0.18) 7px,

    rgba(8,74,45,0.18) 8px
  );

  border-radius:45%;

  transform:
  perspective(800px)
  rotateX(70deg)
  skewY(-8deg);

}
    .wave{

  filter:blur(0.3px);
}
  </style>
</head>
<body>

  <div class="wave wave-left"></div>
<div class="wave wave-right"></div>
  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
  
    <!-- LOGIN FORM -->
    <form>
      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );


    alert("Login berhasil 🔥");

    window.location.href = "dashboard.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
