<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background:linear-gradient(
    135deg,
    #dff7e7,
    #f5fff8
  );
  position:relative;
}
    body::before{
  content:'';
  position:absolute;
  width:300px;
  height:300px;
  background:#5fd387;
  border-radius:50%;
  top:-120px;
  right:-120px;
  filter:blur(90px);
  opacity:0.5;
}

body::after{
  content:'';
  position:absolute;
  width:250px;
  height:250px;
  background:#2e9e5b;
  border-radius:50%;
  bottom:-100px;
  left:-100px;
  filter:blur(90px);
  opacity:0.25;
}

    .container{
  width:100%;
  max-width:360px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(12px);
  padding:35px 25px;
  border-radius:28px;
  box-shadow:0 8px 30px rgba(0,0,0,0.08);
  text-align:center;
  position:relative;
  z-index:2;
}

    .logo{
      width:95px;
      margin-bottom:18px;
    }

    .title{
  font-size:19px;
  font-weight:700;
  margin-bottom:30px;
  color:#01310b;
  line-height:1.6;
}

    .input-group{
      margin-bottom:15px;
      text-align:left;
    }

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
      display:block;
    }

    .input-group input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  outline:none;
  font-size:14px;
  background:#f3f7f4;
}

    .login-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(
    135deg,
    #0f5c22,
    #2e9e5b
  );
  border:none;
  border-radius:14px;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  transition:0.3s;
}

    .login-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

    .signin-text{
      margin-top:18px;
      font-size:13px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
    <!-- TITLE -->
    <div class="title">
      KKN - 7 STIES DARUL HUDA<br>
      MESUJI KELOMPOK 9
    </div>

    <!-- LOGIN FORM -->
    <form>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>

      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );


    alert("Login berhasil 🔥");

    window.location.href = "dashboard.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
