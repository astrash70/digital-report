<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>

  <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  background:
  linear-gradient(
    135deg,
    #edf3e6,
    #e8f0e1
  );

  position:relative;
}


/* BLOB KIRI */

body::before{

  content:"";

  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(29,255,94,0.95),
    rgba(29,255,94,0.08)
  );

  filter:blur(40px);

  left:-140px;

  top:180px;

  z-index:1;
}


/* BLOB KANAN */

body::after{

  content:"";

  position:absolute;

  width:430px;
  height:430px;

  border-radius:38%;

  background:
  radial-gradient(
    circle,
    rgba(145,255,0,0.95),
    rgba(145,255,0,0.05)
  );

  filter:blur(45px);

  right:-120px;

  top:80px;

  transform:rotate(-25deg);

  z-index:1;
}



/* CONTAINER */

.container{

  position:relative;

  z-index:10;

  width:85%;

  max-width:980px;

  min-height:560px;

  border-radius:45px;

  padding:70px;

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  background:
  rgba(255,255,255,0.18);

  backdrop-filter:blur(25px);

  border:
  1px solid rgba(255,255,255,0.45);

  box-shadow:
  0 10px 50px rgba(255,255,255,0.35),
  0 25px 80px rgba(0,0,0,0.05);

  overflow:hidden;
}


/* GLOW DALAM */

.container::before{

  content:"";

  position:absolute;

  width:280px;
  height:280px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(161,255,88,0.55),
    transparent 70%
  );

  filter:blur(30px);

  left:40px;

  top:120px;
}



/* BLOB DALAM KANAN */

.container::after{

  content:"";

  position:absolute;

  width:240px;
  height:240px;

  border-radius:35%;

  background:
  radial-gradient(
    circle,
    rgba(85,255,145,0.45),
    transparent 70%
  );

  filter:blur(35px);

  right:70px;

  top:80px;
}

   .logo{
  width:110px;
  margin-bottom:25px;
  position:relative;
  z-index:5;
}

    .title{

  font-size:36px;

  font-weight:700;

  text-align:center;

  margin-bottom:40px;

  color:#4d7070;

  line-height:1.5;

  position:relative;

  z-index:5;
}

    .input-group{
      margin-bottom:15px;
      text-align:left;
    }

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
      display:block;
    }

    .input-group input{

  width:420px;

  max-width:100%;

  padding:18px;

  border:none;

  border-radius:30px;

  outline:none;

  font-size:15px;

  background:
  rgba(255,255,255,0.55);

  backdrop-filter:blur(10px);
}

  .login-btn{

  width:420px;

  max-width:100%;

  padding:18px;

  border:none;

  border-radius:18px;

  background:#5f8884;

  color:white;

  font-size:20px;

  font-weight:bold;

  margin-top:25px;

  cursor:pointer;

  transition:0.3s;

  position:relative;

  z-index:5;
}
    .login-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

    .signin-text{
      margin-top:18px;
      font-size:13px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}

    @media(max-width:768px){

  .container{

    width:92%;

    min-height:auto;

    padding:45px 25px;

    border-radius:30px;
  }

  .title{

    font-size:24px;
  }

  .input-group input,
  .login-btn{

    width:100%;
  }

  body::before{

    width:260px;
    height:260px;

    left:-120px;

    top:300px;
  }

  body::after{

    width:260px;
    height:260px;

    right:-120px;

    top:60px;
  }

}
    
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
    <!-- TITLE -->
    <div class="title">
      KKN - 7 STIES DARUL HUDA<br>
      MESUJI KELOMPOK 9
    </div>

    <!-- LOGIN FORM -->
    <form>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>

      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );


    alert("Login berhasil 🔥");

    window.location.href = "dashboard.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
