<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>

  <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  position:relative;

  background:
  radial-gradient(
    circle at top left,
    #edf3e7,
    #d7e2d0,
    #c6d3bf
  );
}


/* CONTAINER */

.container{

  width:720px;

  height:720px;

  border-radius:50%;

  background:
  rgba(255,255,255,0.10);

  backdrop-filter:blur(25px);

  border:
  2px solid rgba(255,255,255,0.35);

  box-shadow:
  inset 0 0 40px rgba(255,255,255,0.08);

  z-index:10;
  display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

position:relative;
  box-shadow:
inset 0 0 40px rgba(255,255,255,0.15),
0 0 50px rgba(255,255,255,0.08);
}


/* GLOW DALAM */

.container::before{

  content:"";

  position:absolute;

  width:280px;
  height:280px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(161,255,88,0.55),
    transparent 70%
  );

  filter:blur(30px);

  left:40px;

  top:120px;
}



/* BLOB DALAM KANAN */

.container::after{

  content:"";

  position:absolute;

  width:240px;
  height:240px;

  border-radius:35%;

  background:
  radial-gradient(
    circle,
    rgba(85,255,145,0.45),
    transparent 70%
  );

  filter:blur(35px);

  right:70px;

  top:80px;
}

   .logo{
  width:110px;
  margin-bottom:25px;
  position:relative;
  z-index:5;
}
    .input-group{
      margin-bottom:15px;
      text-align:left;
    }

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
      display:block;
    }

   .input-group input{

  width:520px;

  max-width:100%;

  height:72px;

  padding:0 28px;

  border-radius:24px;

  border:
  1px solid rgba(255,255,255,0.45);

  background:
 rgba(255,255,255,0.10)

  backdrop-filter:blur(10px);

  outline:none;

  font-size:18px;

  color:#234434;
}

  .login-btn{

  width:260px;

  height:72px;

  border:none;

  border-radius:40px;

  background:
  linear-gradient(
  135deg,
  #0b2418,
  #115433
  );

  color:white;

  font-size:22px;

  font-weight:400;

  letter-spacing:2px;

  cursor:pointer;

  margin-top:40px;

  box-shadow:
  0 10px 30px rgba(0,80,40,0.35);

  z-index:5;
}
    .login-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

    .signin-text{
      margin-top:18px;
      font-size:13px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}

    @media(max-width:768px){

  .container{

    width:95vw;

    height:95vw;

    min-height:unset;
  }

  .title{

    font-size:38px;
  }

  .input-group input{

    width:78vw;

    height:62px;
  }

  .login-btn{

    width:220px;

    height:62px;
  }

}
    .wave{

  position:absolute;

  width:900px;
height:500px;

  mix-blend-mode:multiply;

opacity:0.6;

  filter:blur(0px);

  opacity:0.9;

  z-index:1;

  pointer-events:none;
}
    .wave-left{

  left:-340px;

  bottom:-250px;

  background:
  repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 8px,
    rgba(0,70,35,0.08) 9px,
    rgba(0,70,35,0.08) 11px
  );

  transform:
  rotate(-20deg);
}
    .wave-right{

  right:-320px;

  top:-160px;

  background:
  repeating-radial-gradient(
    circle at center,
    transparent 0px,
    transparent 8px,
    rgba(0,70,35,0.08) 9px,
    rgba(0,70,35,0.08) 11px
  );

  transform:
  rotate(25deg);
}
    
  </style>
</head>
<body>

  <div class="wave wave-left"></div>
<div class="wave wave-right"></div>
  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
  
    <!-- LOGIN FORM -->
    <form>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
      </div>

      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );


    alert("Login berhasil 🔥");

    window.location.href = "dashboard.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
