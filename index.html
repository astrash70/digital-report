<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  position:relative;

  background-image:url("bg-desktop.png");

  background-size:100% 100%;

  background-position:center;

  background-repeat:no-repeat;
}
/* CONTAINER */

.container{

  position:relative;

  width:560px;
  height:560px;

  border-radius:50%;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  background:
rgba(188, 201, 176, 0.18);

  backdrop-filter:blur(28px) saturate(180%);

  border:
2px solid rgba(235,245,230,0.45);

  box-shadow:

inset 0 2px 8px rgba(255,255,255,0.45),

inset -15px -15px 25px rgba(255,255,255,0.08),

inset 15px 15px 25px rgba(0,60,30,0.08),

0 0 45px rgba(255,255,255,0.45),

0 0 120px rgba(120,255,170,0.22);

  overflow:hidden;

  animation: liquid 8s ease-in-out infinite;
}
/* GLOW DALAM */

.container::before{

  content:"";

  position:absolute;

  width:420px;
  height:420px;

  border-radius:
55% 45% 52% 48% /
48% 55% 45% 52%;

  background:
  radial-gradient(
    circle,
    rgba(120,255,150,0.20),
    transparent 70%
  );

  filter:blur(55px);

  right:80px;
  top:120px;
}

    .container::after{

  content:"";

  position:absolute;

  width:320px;
  height:180px;

  top:55px;
  left:70px;

  border-radius:50%;

  background:
  radial-gradient(

    circle at top left,

    rgba(255,255,255,0.85) 0%,

    rgba(255,255,255,0.35) 30%,

    rgba(255,255,255,0.08) 55%,

    transparent 75%

  );

  filter:blur(10px);

  opacity:0.9;

  transform:rotate(-12deg);

}
    
   .logo{
  width:110px;
  margin-bottom:50px;
  position:relative;
  z-index:5;
}
    .input-group{
      margin-bottom:19px;
      text-align:left;
      position:relative;
    }

    .input-group i{

  position:absolute;

  right:20px;

  top:50%;

  transform:translateY(-50%);

  font-size:30px;

  color:#04552b;

  cursor:pointer;

}

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:7px;
      display:block;
    }

  .input-group input{

  width:368px;
  height:58px;

  border-radius:18px;
  padding:0 65px 0 18px;

  background:rgba(255,255,255,0.16);

  border:1px solid rgba(255,255,255,0.4);

  font-size:14px;

  box-shadow:
  0 0 18px rgba(0, 90, 40, 0.25),
  0 0 35px rgba(0, 120, 50, 0.18),
  inset 0 0 10px rgba(255,255,255,0.15);

} /* <- INI YANG KURANG */

.login-btn{

  width:128px;
  height:39px;
  margin:auto;
  border-radius:45px;

  display:block;

  transform:translateY(20px);
  font-size:14px;

  letter-spacing:1px;

  background:
  linear-gradient(
    135deg,
    #0f7a38,
    #032f1b
  );

  color:white;

  border:none;

  box-shadow:
  0 10px 30px rgba(0,80,35,0.45),
  inset 0 0 12px rgba(255,255,255,0.15);

  cursor:pointer;
}
    .login-btn:hover{
  transform:translateY(18px);
  opacity:0.95;
}

    .signin-text{
      margin-top:35px;
      font-size:10px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:6px;
      font-size:10px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}
    
    @media(max-width:768px){

  body{

    background-image:url("bg-mobile.png");

  }

}

@keyframes liquid{

  0%{
    border-radius:
    55% 45% 52% 48% /
    48% 55% 45% 52%;
  }

  50%{
    border-radius:
    48% 52% 45% 55% /
    55% 45% 52% 48%;
  }

  100%{
    border-radius:
    55% 45% 52% 48% /
    48% 55% 45% 52%;
  }

}
    
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
  
    <!-- LOGIN FORM -->
    <form>
<div class="input-group">

  <input
  type="email"
  id="email"
  placeholder="Masukkan email">

  <i class="fa-solid fa-user"></i>

</div>


<div class="input-group">

  <input
  type="password"
  id="password"
  placeholder="Masukkan password">

  <i
  class="fa-solid fa-lock lock-icon"
  id="togglePassword"></i>

</div>
      
      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    window.location.href = "dashboard.html";

}

catch (error) {

    console.log(error);

    alert(error.message);

}

};

const togglePassword =
document.getElementById("togglePassword");

const password =
document.getElementById("password");


togglePassword.addEventListener("click", ()=>{

    if(password.type === "password"){

        password.type = "text";

        togglePassword.classList.remove("fa-lock");

        togglePassword.classList.add("fa-lock-open");

    }

    else{

        password.type = "password";

        togglePassword.classList.remove("fa-lock-open");

        togglePassword.classList.add("fa-lock");

    }

});

</script>

</body>
</html>
