<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Dashboard</title>

  <style>
   *{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  overflow:hidden;

  position:relative;

  background-image:url("bg-desktop.png");

  background-size:98% 98%;

  background-position:center;

  background-repeat:no-repeat;
}
/* CONTAINER */

.container{

  position:relative;

  width:760px;
  height:760px;

  border-radius:50%;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  background:
  rgba(255,255,255,0.06);

  backdrop-filter:blur(22px);

  border:
  2px solid rgba(255,255,255,0.55);

  box-shadow:

inset 0 0 40px rgba(255,255,255,0.18),

0 0 45px rgba(255,255,255,0.45),

0 0 90px rgba(120,255,170,0.18),

0 0 120px rgba(255,255,255,0.55),

0 0 180px rgba(120,255,170,0.22);

  overflow:hidden;
}
/* GLOW DALAM */

.container::before{

  content:"";

  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(120,255,150,0.20),
    transparent 70%
  );

  filter:blur(55px);

  right:80px;
  top:120px;
}
   .logo{
  width:110px;
  margin-bottom:25px;
  position:relative;
  z-index:5;
}
    .input-group{
      margin-bottom:15px;
      text-align:left;
    }

    .input-group label{
      font-size:14px;
      color:#555;
      margin-bottom:5px;
      display:block;
    }

   .input-group input{

  width:530px;

  height:78px;

  border-radius:28px;
  padding:0 28px;
  background:
  rgba(255,255,255,0.16);

  border:
  1px solid rgba(255,255,255,0.4);

  font-size:20px;

     box-shadow:
inset 0 0 12px rgba(255,255,255,0.35),
0 0 18px rgba(255,255,255,0.18);
}

  .login-btn{

  width:280px;

  height:78px;

  border-radius:45px;

  font-size:28px;

  letter-spacing:2px;
  background:
linear-gradient(
  135deg,
  #0f7a38,
  #032f1b
);

color:white;

border:none;

box-shadow:
0 10px 30px rgba(0,80,35,0.45),
inset 0 0 12px rgba(255,255,255,0.15);

cursor:pointer;
}
    .login-btn:hover{
  transform:translateY(-2px);
  opacity:0.95;
}

    .signin-text{
      margin-top:18px;
      font-size:13px;
      color:#666;
    }

    .signin-text a{
      color:#012b08;
      text-decoration:none;
      font-weight:bold;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:#999;
    }

    html, body{
  overflow-x:hidden;
}
    
    @media(max-width:768px){

  body{

    background-image:url("bg-mobile.png");

  }

}
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
<img src="logo.png" alt="Logo" class="logo">
  
    <!-- LOGIN FORM -->
    <form>
<div class="input-group">
    <input type="email" id="email" placeholder="Masukkan email">
  </div>

  <div class="input-group">
    <input type="password" id="password" placeholder="Masukkan password">
  </div>
      
      <button type="button" class="login-btn" onclick="loginUser()">
  Login
</button>

    </form>

    <!-- SIGN IN -->
    <div class="signin-text">
      Belum punya akun?
      <a href="signup.html">Sign In</a>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      By.Astri asih
    </div>

  </div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



window.loginUser = async function () {

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );


    alert("Login berhasil 🔥");

    window.location.href = "dashboard.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
