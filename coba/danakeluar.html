/* ======================
SIDEBAR
====================== */

.sidebar{

    #06351f,
    #041f14
  );

}

.sidebar::before{

    rgba(32,201,111,0.16),

.logo{

  z-index:2;
}

}

.logo-icon{

  border-radius:14px;

  display:flex;

  align-items:center;

}

.logo-icon i{

}

.sidebar-menu{

  flex-direction:column;

  gap:8px;

  z-index:2;
}

.sidebar-item{

.sidebar-item i{

}

.sidebar-item:hover{

}

.sidebar-item.active{

  linear-gradient(
    135deg,

    #11853c

}

.sidebar-title{

  display:flex;

  justify-content:center;

}

/* ======================
MAIN
====================== */

.main-content{

  margin-left:260px;

}

/* ======================
TOPBAR
====================== */

.topbar{

.topbar h1{

.topbar-right{

  border-radius:16px;

  padding:14px 18px;

  align-items:center;

  gap:12px;

}

/* ======================
FILTER
====================== */

.filter-bar{
    display:flex;
    align-items:flex-end;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.filter-item{

  display:flex;

  flex-direction:column;

  gap:8px;
}

.filter-item label{
    font-size:12px;
    margin-bottom:4px;
    color:#667085;
}

.filter-item input,
.filter-item select{
    height:40px;
    min-width:140px;
    border:1px solid #d0d5dd;
    border-radius:10px;
    padding:0 12px;
    font-size:14px;
    background:white;
}

.filter-item input{
    min-width:200px;
}

.filter-btn{

  border-radius:14px;

  font-weight:700;

  cursor:pointer;
}

.btn-green{

  linear-gradient(
    135deg,
    #0a6b2d,
    #11853c
  );

}

/* ======================
KPI
====================== */

.kpi-grid{
  display:grid;
  grid-template-columns:repeat(1,1fr);
  gap:16px;
  margin-bottom:18px;
}

.kpi-card{

  background:white;

  min-height:120px;

  border:
  1px solid #edf1f3;

  border-radius:22px;

  padding:22px;

  display:flex;

  justify-content:space-between;

  align-items:flex-start;
}

.kpi-card h5{

  margin-bottom:14px;
}

.kpi-card h2{

  font-size:28px;

  font-weight:800;

  margin-bottom:10px;
}

.kpi-icon{

  width:50px;
  height:50px;

  border-radius:50%;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:22px;
}

/* ======================
TABLE
====================== */

.card{

  background:white;

  border:
  1px solid #edf1f3;

  border-radius:24px;

  padding:22px;
}

.table-header{

  align-items:center;

.table-header h3{

table{

thead{

th{

td{

.empty-state{

.empty-state i{

/* ======================

<script>
/* =========================
KONSTANTA & HELPERS
========================= */
const MONTH_NAMES = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const today = new Date();
const options = { day: 'numeric', month: 'long', year: 'numeric' };

function formatRupiah(value) {
  const num = Number(String(value || 0).replace(/[^\d.-]/g, '')) || 0;
  return 'Rp ' + num.toLocaleString('id-ID');
}

function parseRupiah(value) {
  const num = Number(String(value || '0').replace(/[^0-9]/g, '')) || 0;
  return num;
}

function formatDateDisplay(dateStr) {
  const parts = dateStr.split('-');
  if (parts.length !== 3) return dateStr;
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
}

/* =========================
CEK APAKAH MUTASI ADALAH DANA KELUAR
========================= */

function isDanaKeluar(item) {
  /* Normalisasi: hapus karakter panah (↑ ↓), lowercase, trim, rapikan spasi */
  const normalize = (val) => {
    return String(val || '')
      .replace(/[↑↓]/g, '')   /* hapus panah */
      .replace(/\s+/g, ' ')    /* rapikan spasi ganda */
      .toLowerCase()
      .trim();
  };

  const arah = normalize(item.arah);
  const cash = normalize(item.cash);

  console.log('RAW ARAH =', item.arah);
  console.log('RAW CASH =', item.cash);
  console.log('NORMALIZED ARAH =', arah);
  console.log('NORMALIZED CASH =', cash);

  /* KONDISI 1: Kategori = None, Efek = Cash Out */
  if ((arah === '' || arah === 'none') && cash === 'cash out') return true;

  /* KONDISI 2: Kategori = Saldo Out, Efek = None */
  if (arah === 'saldo out' && (cash === '' || cash === 'none')) return true;

  /* SEMUA kondisi lain: TIDAK MASUK DANA KELUAR */
  return false;
}

/* =========================
AMBIL SEMUA DATA DANA KELUAR
========================= */

function getAllDanaKeluar() {
  const results = [];

  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('laporan_')) continue;

    const dateKey = key.replace('laporan_', '');
    /* Validasi format YYYY-MM-DD */
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dateKey)) continue;

    let raw;
    try {
      raw = JSON.parse(localStorage.getItem(key));
    } catch(e) {
      continue;
    }
    if (!raw || typeof raw !== 'object') continue;

    console.log('KEY', key);

    const mutasiData = Array.isArray(raw.mutasiData) ? raw.mutasiData : [];

    mutasiData.forEach(item => {
      console.log('ITEM FULL', JSON.stringify(item));
      if (isDanaKeluar(item)) {
        results.push({
          tanggal: dateKey,
          nominal: parseRupiah(item.nominal || '0'),
          keterangan: String(item.keterangan || item.jenis || ''),
          jenis: String(item.jenis || ''),
          arah: String(item.arah || ''),
          cash: String(item.cash || '')
        });
      }
    });
  }

  /* Urutkan descending berdasarkan tanggal (terbaru dulu) */
  results.sort((a, b) => {
    if (a.tanggal > b.tanggal) return -1;
    if (a.tanggal < b.tanggal) return 1;
    return 0;
  });

  return results;
}

/* =========================
FILTER DATA
========================= */

function getFilteredDanaKeluar() {
  const allData = getAllDanaKeluar();
  const searchText = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const startDate = document.getElementById('filterStartDate').value;
  const endDate = document.getElementById('filterEndDate').value;

  let filtered = allData;

  /* Filter tanggal */
  if (startDate) {
    filtered = filtered.filter(item => item.tanggal >= startDate);
  }
  if (endDate) {
    filtered = filtered.filter(item => item.tanggal <= endDate);
  }

  /* Filter search */
  if (searchText) {
    filtered = filtered.filter(item => {
      return (
        item.keterangan.toLowerCase().includes(searchText) ||
        item.nominal.toString().includes(searchText) ||
        item.jenis.toLowerCase().includes(searchText) ||
        item.tanggal.includes(searchText)
      );
    });
  }

  return filtered;
}

/* =========================
RENDER
========================= */

function renderDanaKeluar() {
  const data = getFilteredDanaKeluar();
  const total = data.reduce((sum, item) => sum + item.nominal, 0);

  /* KPI */
  document.getElementById('kpiTotalPengeluaran').textContent = formatRupiah(total);

  /* Table */
  const tbody = document.getElementById('danaKeluarBody');

  if (data.length === 0) {
    tbody.innerHTML = `
      <tr>
        <td colspan="4">
          <div class="empty-state">
            <i class="fa-regular fa-circle-xmark"></i>
            Tidak ada data pengeluaran
          </div>
        </td>
      </tr>
    `;
    return;
  }

  tbody.innerHTML = data.map((item, index) => `
    <tr>
      <td>${index + 1}</td>
      <td>${formatDateDisplay(item.tanggal)}</td>
      <td style="text-align:left;font-weight:600;color:#dc2626;">${formatRupiah(item.nominal)}</td>
      <td>${item.keterangan}</td>
    </tr>
  `).join('');
}

/* =========================
INITIALIZE
========================= */

function initializePage() {
  document.getElementById('todayDate').textContent = today.toLocaleDateString('id-ID', options);

  /* Set default filter: bulan ini */
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
  document.getElementById('filterStartDate').value = firstDay.toISOString().split('T')[0];
  document.getElementById('filterEndDate').value = lastDay.toISOString().split('T')[0];

  renderDanaKeluar();
}

document.addEventListener('DOMContentLoaded', initializePage);
</script>
