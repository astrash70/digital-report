<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sign Up</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

  overflow:hidden;

  position:relative;

  background:
  linear-gradient(
    135deg,
    #eef2ec,
    #f4f6f2
  );
}

    /* SOFT BLOB 1 */

body::before{

  content:"";

  position:absolute;

  width:420px;
  height:420px;

  background:
  radial-gradient(
    circle,
    rgba(34,120,70,0.18),
    transparent 70%
  );

  top:-120px;
  left:-100px;

  border-radius:50%;

  filter:blur(40px);

  animation:float1 8s ease-in-out infinite;
}


/* SOFT BLOB 2 */

body::after{

  content:"";

  position:absolute;

  width:380px;
  height:380px;

  background:
  radial-gradient(
    circle,
    rgba(70,140,110,0.14),
    transparent 70%
  );

  bottom:-120px;
  right:-80px;

  border-radius:50%;

  filter:blur(45px);

  animation:float2 10s ease-in-out infinite;
}


/* ANIMATION */

@keyframes float1{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(20px);
  }

  100%{
    transform:translateY(0px);
  }

}

@keyframes float2{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-20px);
  }

  100%{
    transform:translateY(0px);
  }

}

    .container{
      width:100%;
      max-width:350px;
      background:white;
      padding:30px 25px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    .title{
      text-align:center;
      font-size:22px;
      font-weight:bold;
      margin-bottom:25px;
      color:#333;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group label{
      display:block;
      margin-bottom:5px;
      font-size:14px;
      color:#555;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      outline:none;
    }

    .signup-btn{
      width:100%;
      padding:12px;
      background:#2d89ef;
      border:none;
      border-radius:10px;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:10px;
    }

    .footer{
      text-align:center;
      margin-top:20px;
      font-size:12px;
      color:#999;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="title">
    Sign Up
  </div>

  <div class="input-group">
    <label>Nama Toko</label>
    <input type="text" id="namaToko" placeholder="Masukkan nama toko">
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Masukkan email">
  </div>

  <div class="input-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Masukkan password">
  </div>

  <button class="signup-btn" onclick="registerUser()">
    Daftar
  </button>

  <div class="footer">
    BY.ASTRIASIH
  </div>

</div>


<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const firebaseConfig = {
  apiKey: "AIzaSyA0YHpAO0JyCNt-oJNwJdgKCOwLiagrfvg",
  authDomain: "digital-report-3567d.firebaseapp.com",
  projectId: "digital-report-3567d",
  storageBucket: "digital-report-3567d.firebasestorage.app",
  messagingSenderId: "509408276429",
  appId: "1:509408276429:web:65323d54b3211644ecde84"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);



window.registerUser = async function () {

  const namaToko = document.getElementById("namaToko").value;

  const email = document.getElementById("email").value;

  const password = document.getElementById("password").value;


  try {

    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;


    await setDoc(doc(db, "users", user.uid), {

      namaToko: namaToko,
      email: email,
      createdAt: new Date()

    });


    alert("Akun berhasil dibuat 🔥");

    window.location.href = "index.html";

  }

  catch (error) {

    console.log(error);

    alert(error.message);

  }

};

</script>

</body>
</html>
